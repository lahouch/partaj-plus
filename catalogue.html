<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partaj+ — Mon Catalogue d'Avantages</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; min-height: 100vh; }

        .catalog-header {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8F66 100%);
            color: white;
            padding: 20px 16px 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }
        .catalog-logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
        .catalog-logo span { opacity: 0.8; }
        .catalog-commune { font-size: 0.85rem; opacity: 0.9; }
        .catalog-user {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .impact-bar {
            background: #FFF5F0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            border-bottom: 1px solid #FFE8DD;
        }
        .impact-bar strong { color: #FF6B35; }

        .filters {
            display: flex;
            gap: 8px;
            padding: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid #E5E5F0;
            background: white;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip.active { background: #FF6B35; color: white; border-color: #FF6B35; }

        .section-title {
            padding: 8px 16px 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #1A1A2E;
        }

        .offer-list { padding: 0 16px 16px; }
        .offer-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
            transition: transform 0.2s;
        }
        .offer-card:active { transform: scale(0.98); }

        .offer-top {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
        }
        .offer-emoji {
            font-size: 2.2rem;
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F5F5F5;
            border-radius: 14px;
        }
        .offer-info { flex: 1; }
        .offer-info h4 { font-size: 1rem; font-weight: 700; color: #1A1A2E; margin-bottom: 2px; }
        .offer-info p { font-size: 0.85rem; color: #888; line-height: 1.4; }

        .offer-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-local { background: #E8F8F5; color: #06D6A0; }
        .badge-national { background: #EBF2FA; color: #004E89; }
        .badge-flash { background: #FFF0F3; color: #EF476F; }
        .badge-populaire { background: #FFF5E6; color: #FF6B35; }

        .offer-code {
            background: #F5F5F5;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .offer-code-label { font-size: 0.75rem; color: #888; }
        .offer-code-value {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: #FF6B35;
            letter-spacing: 1px;
        }

        .offer-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-code { background: #FF6B35; color: white; }
        .btn-code:active { background: #E55A2B; }
        .btn-link { background: #004E89; color: white; }
        .btn-link:active { background: #003D6B; }

        .catalog-footer {
            text-align: center;
            padding: 24px 16px 40px;
            font-size: 0.8rem;
            color: #888;
        }
        .catalog-footer a { color: #FF6B35; text-decoration: none; font-weight: 600; }

        .offer-card { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1A1A2E;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

    <div class="catalog-header">
        <div class="catalog-logo">Partaj<span>+</span></div>
        <div class="catalog-commune">📍 Anderlecht</div>
        <div class="catalog-user">👤 Connecté via votre entreprise</div>
    </div>

    <div class="impact-bar">
        En utilisant ce catalogue, vous <strong>soutenez l'ASBL PARTAJOY</strong> et ses actions sociales ❤️
    </div>

    <div class="filters" id="filters">
        <button class="filter-chip active" data-filter="all">🔥 Tout</button>
        <button class="filter-chip" data-filter="local">🏪 Local</button>
        <button class="filter-chip" data-filter="national">🇧🇪 National</button>
        <button class="filter-chip" data-filter="flash">⚡ Flash</button>
    </div>

    <div class="section-title" id="sectionTitle">🔥 Les meilleures offres</div>
    <div class="offer-list" id="offerList">
        <div class="loading">Chargement des offres...</div>
    </div>

    <div class="catalog-footer">
        <p>Catalogue offert par <a href="index.html">Partaj+</a></p>
        <p style="margin-top:4px">Une initiative de <a href="https://lahouch.github.io/partajoy/" target="_blank" style="color: #FF6B35; text-decoration: none; font-weight: 600;">PARTAJOY asbl</a> ❤️</p>
    </div>

    <div class="toast" id="toast">Code copié !</div>

    <script>
        let allDeals = [];
        let currentFilter = 'all';

        async function loadDeals() {
            try {
                const [dealsRes, localRes] = await Promise.all([
                    fetch('data/deals.json'),
                    fetch('data/local.json')
                ]);
                const dealsData = await dealsRes.json();
                const localData = await localRes.json();

                allDeals = [
                    ...dealsData.deals.filter(d => d.validated).map(d => ({...d, sortOrder: d.featured ? 0 : 1})),
                    ...localData.deals.filter(d => d.validated).map(d => ({...d, source: 'local', sortOrder: d.featured ? 0 : 1}))
                ];

                allDeals.sort((a, b) => a.sortOrder - b.sortOrder);

                renderDeals();
            } catch (err) {
                console.error('Erreur:', err);
                document.getElementById('offerList').innerHTML = `
                    <div class="loading">⚠️ Erreur de chargement du catalogue</div>`;
            }
        }

        function renderDeals() {
            const container = document.getElementById('offerList');
            let filtered = allDeals;

            if (currentFilter === 'local') filtered = allDeals.filter(d => d.category === 'local');
            if (currentFilter === 'national') filtered = allDeals.filter(d => d.category === 'national');
            if (currentFilter === 'flash') filtered = allDeals.filter(d => d.category === 'flash');

            if (filtered.length === 0) {
                container.innerHTML = `<div class="loading">📭 Aucune offre disponible</div>`;
                return;
            }

            container.innerHTML = filtered.map((deal, i) => {
                const badgeClass = deal.category === 'local' ? 'badge-local' :
                                   deal.category === 'flash' ? 'badge-flash' : 'badge-national';
                const badgeText = deal.badge || deal.category;

                const codeBlock = deal.code ? `
                    <div class="offer-code">
                        <span class="offer-code-label">Votre code :</span>
                        <span class="offer-code-value">${deal.code}</span>
                    </div>` : '';

                const btnBlock = deal.type === 'code' && deal.code ?
                    `<button class="offer-btn btn-code" onclick="copyCode(this, '${deal.code}')">📋 Copier le code</button>` :
                    deal.url ?
                    `<a href="${deal.url}" target="_blank" class="offer-btn btn-link">Voir l'offre →</a>` : '';

                return `
                <div class="offer-card" data-category="${deal.category}" style="animation-delay: ${i * 0.05}s">
                    <span class="offer-badge ${badgeClass}">${badgeText}</span>
                    <div class="offer-top">
                        <div class="offer-emoji">${deal.emoji}</div>
                        <div class="offer-info">
                            <h4>${deal.title}</h4>
                            <p>${deal.description}</p>
                        </div>
                    </div>
                    ${codeBlock}
                    ${btnBlock}
                </div>`;
            }).join('');
        }

        // FILTRES
        document.getElementById('filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-chip')) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;

            const titles = { all: '🔥 Les meilleures offres', local: '🏪 Offres locales', national: '🇧🇪 Offres nationales', flash: '⚡ Offres flash' };
            document.getElementById('sectionTitle').textContent = titles[currentFilter];

            renderDeals();
        });

        // COPY CODE
        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById('toast');
                toast.textContent = 'Code ' + code + ' copié !';
                toast.classList.add('show');
                btn.textContent = '✅ Copié !';
                setTimeout(() => {
                    toast.classList.remove('show');
                    btn.textContent = '📋 Copier le code';
                }, 2000);
            });
        }

        // INIT
        loadDeals();
    </script>
</body>
</html>
